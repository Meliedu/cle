[pytest]
# pytest-asyncio: keep a single event loop for the whole test session so the
# module-global ``test_engine`` connection pool (and its asyncpg connections)
# stays bound to one loop across fixtures and tests. This matches the behavior
# the suite previously got from the now-deprecated session-scoped ``event_loop``
# fixture. The event loop *policy* (selector vs proactor) is supplied by the
# ``event_loop_policy`` fixture in tests/conftest.py.
asyncio_mode = strict
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
